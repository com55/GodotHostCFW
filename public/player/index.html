<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Game Host</title>
    <link id="favicon" rel="icon" type="image/png" href="/player/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/player/style.css" />
  </head>
  <body>
    <!-- Access Code Screen (for private games) -->
    <div id="access-screen" class="access-screen hidden">
      <div class="access-card">
        <div class="access-icon">🔒</div>
        <h1 class="access-title" id="access-game-title">Private Game</h1>
        <p class="access-subtitle">
          This game is private.<br />Enter the access code to play.
        </p>
        <form id="access-form">
          <div class="access-input-wrapper">
            <input
              type="text"
              id="access-code-input"
              placeholder="Enter access code"
              required
              autocomplete="off"
            />
            <button type="submit" id="access-submit" class="access-btn">
              <span class="access-btn-text">▶</span>
            </button>
          </div>
          <div id="access-error" class="access-error hidden">
            Invalid access code
          </div>
        </form>
      </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen hidden">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading game...</p>
      </div>
    </div>

    <!-- Game Container -->
    <div id="game-container" class="game-container hidden">
      <iframe
        id="game-iframe"
        class="game-iframe"
        allowfullscreen
        allow="autoplay; fullscreen; microphone; gamepad; cross-origin-isolated"
      ></iframe>

      <!-- Controls overlay -->
      <div id="game-controls" class="game-controls">
        <span id="game-title-bar" class="game-title-bar">Game</span>
        <div class="game-controls-right">
          <button id="fullscreen-btn" class="control-btn" title="Fullscreen">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="15 3 21 3 21 9" />
              <polyline points="9 21 3 21 3 15" />
              <line x1="21" y1="3" x2="14" y2="10" />
              <line x1="3" y1="21" x2="10" y2="14" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Error Screen -->
    <div id="error-screen" class="error-screen hidden">
      <div class="error-card">
        <div class="error-icon">⚠️</div>
        <h2>Something went wrong</h2>
        <p id="error-message" class="error-message">Could not load the game.</p>
      </div>
    </div>

    <script src="/player/app.js"></script>
  </body>
</html>
